version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/data/prod.db
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=change-this-secret-in-production
    volumes:
      - procedure_data:/app/data
      - procedure_uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/workspaces/current"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  procedure_data:
    driver: local
  procedure_uploads:
    driver: local

